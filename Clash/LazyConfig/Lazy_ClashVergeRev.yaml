# ---- 本地服务器节点 -----
proxies:

# ---- 节点订阅链接 -----
proxy-providers:
  订阅一:
    url: '订阅一URL'
    path: ./proxy_provider/订阅一.yaml
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: DIRECT
    header:
      User-Agent:
        - 'Clash/v1.18.0'
        - 'mihomo/1.19.19'
    filter: '新加坡|坡|狮城|SG|Singapore|德国|德|DE|Germany|美国|美|us|unitedstates|united states|剩余流量'
    exclude-filter: '应急`不能用`Tiktok'
    override:
      proxy-name:
        - pattern: '剩余流量'
          target: '订阅一-剩余流量'
        - pattern: '🎞️ 1.0x '
          target: ''
        - pattern: '1.0x 🇩🇪'
          target: '🇩🇪'
        - pattern: 'SG'
          target: '-订阅一'
        - pattern: 'US'
          target: '-订阅一'
        - pattern: 'DE'
          target: '-订阅一'
  订阅二:
    url: '订阅二URL'
    path: ./proxy_provider/订阅二.yaml
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: DIRECT
    header:
      User-Agent:
        - 'Clash/v1.18.0'
        - 'mihomo/1.19.19'
    filter: '新加坡|坡|狮城|SG|Singapore|德国|德|DE|Germany|美国|美|us|unitedstates|united states|剩余流量'
    override:
      proxy-name:
        - pattern: '剩余流量'
          target: '订阅二-剩余流量'
        - pattern: '新加坡'
          target: '新加坡-media'
        - pattern: '美国'
          target: '美国-media'
        - pattern: '德国'
          target: '德国-media'

# ---- 远程分流规则 -----
